server:
  port: 8080

spring:
  application:
    name: spring-ai-agent-kosta-step0

  datasource:
    url: jdbc:h2:file:./data/agentdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;AUTO_SERVER=TRUE
    driver-class-name: org.h2.Driver
    username: agent
    password: agent

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
    show-sql: false

logging:
  level:
    com.kosta.agent: DEBUG

management:
  endpoints:
    web:
      exposure:
        include: health,info
