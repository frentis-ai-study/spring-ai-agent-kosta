server:
  port: 8080

spring:
  application:
    name: spring-ai-agent-kosta-step3

  datasource:
    url: jdbc:postgresql://localhost:5432/agentdb
    username: agent
    password: ${POSTGRES_PASSWORD:agent}

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
    show-sql: false

  ai:
    openai:
      api-key: ${OPENAI_API_KEY:}
      chat:
        options:
          model: gpt-4o-mini
          temperature: 0.0

    chat:
      memory:
        repository:
          jdbc:
            initialize-schema: always

logging:
  level:
    org.springframework.ai: INFO
    com.kosta.agent: DEBUG

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
