# MCP 실습용 프로파일.
# 실행: ./gradlew bootRun --args='--spring.profiles.active=mcp'
#
# 이 프로파일에서는 우리 주문 도구(OrderMcpTools)가 MCP 서버로 노출되어,
# 외부 MCP 호스트(Claude Desktop, 사내 다른 Agent 등)가 http://localhost:8080/sse 로 접속해 사용한다.
spring:
  ai:
    mcp:
      server:
        enabled: true
        name: order-mcp-server
        version: 1.0.0
        protocol: SSE
        instructions: "고객 주문 조회/취소 도구를 제공하는 MCP 서버입니다."

      # [클라이언트 방향 — 선택] 외부 MCP 서버의 도구를 소비하려면 enabled: true 로 바꾸고
      # 아래 connections 에 대상 서버를 등록한다. 등록된 도구는 ToolCallbackProvider 로 주입된다.
      client:
        enabled: false
        # type: SYNC
        # request-timeout: 30s
        # sse:
        #   connections:
        #     delivery-server:
        #       url: http://localhost:8081
