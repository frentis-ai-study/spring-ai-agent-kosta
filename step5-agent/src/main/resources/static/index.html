<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Spring AI Agent · step5 종합 + SSE</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 text-slate-800">
  <div class="max-w-5xl mx-auto p-6 grid grid-cols-1 lg:grid-cols-[1fr_280px] gap-4">
    <div>
      <header class="mb-4">
        <div class="text-xs font-semibold tracking-widest text-indigo-600 uppercase">STEP 5 · Advisor Chain + SSE</div>
        <h1 class="text-2xl font-bold mt-1">Spring AI Agent — 종합 Agent</h1>
        <p class="text-sm text-slate-500 mt-1">
          Memory + RAG + Tool Calling + SafeGuard + Logger 어드바이저 체인이 동시에 동작합니다.
          스트리밍 모드로 전환하면 토큰이 즉시 흘러나옵니다.
        </p>
      </header>

      <section class="bg-white rounded-2xl shadow-sm border border-slate-200 p-4 mb-4">
        <div class="flex items-center gap-3 flex-wrap">
          <label class="text-sm font-medium text-slate-700">conversationId</label>
          <input id="cid" class="flex-1 min-w-[160px] border border-slate-300 rounded-lg px-3 py-1.5 text-sm font-mono" />
          <button id="reset" class="text-xs text-slate-500 hover:text-indigo-600">새 대화</button>
          <label class="flex items-center gap-1.5 text-xs text-slate-700 cursor-pointer">
            <input id="streamMode" type="checkbox" class="accent-indigo-600" />
            <span>스트리밍 모드</span>
          </label>
          <button id="indexBtn" class="text-xs px-3 py-1.5 bg-emerald-50 text-emerald-700 border border-emerald-200 rounded-lg hover:bg-emerald-100">
            정책 인덱싱
          </button>
          <span id="indexStatus" class="text-xs text-slate-500"></span>
        </div>
      </section>

      <section class="bg-white rounded-2xl shadow-sm border border-slate-200 p-6">
        <div id="history" class="space-y-3 mb-4 max-h-[480px] overflow-y-auto"></div>
        <div class="flex gap-2">
          <input id="message" type="text"
            class="flex-1 border border-slate-300 rounded-lg p-3 text-base focus:outline-none focus:ring-2 focus:ring-indigo-500"
            placeholder="alice 고객의 PAID 주문이 뭐고 환불은 며칠 걸려요?" />
          <button id="send"
            class="px-5 py-3 bg-indigo-600 text-white rounded-lg font-semibold hover:bg-indigo-700 disabled:opacity-50">
            전송
          </button>
        </div>
      </section>
    </div>

    <aside class="bg-white rounded-2xl shadow-sm border border-slate-200 p-4 lg:sticky lg:top-6 self-start">
      <div class="text-xs font-semibold uppercase tracking-wider text-slate-400 mb-3">빠른 시나리오</div>
      <div class="space-y-2">
        <button data-msg="alice@example.com 고객의 최근 주문을 알려주고, 그 중 PAID 상태 환불은 며칠 걸리는지도 정책 기준으로 알려주세요." class="scn w-full text-left text-sm bg-indigo-50 text-indigo-700 rounded-lg px-3 py-2 hover:bg-indigo-100">
          1. Tool + RAG + Memory 동시
        </button>
        <button data-msg="방금 본 주문 중 첫 번째 것을 취소해주세요." class="scn w-full text-left text-sm bg-indigo-50 text-indigo-700 rounded-lg px-3 py-2 hover:bg-indigo-100">
          2. Memory 기반 후속 액션
        </button>
        <button data-msg="제 주민등록번호는 901010-1234567 입니다. 기억해주세요." class="scn w-full text-left text-sm bg-rose-50 text-rose-700 rounded-lg px-3 py-2 hover:bg-rose-100">
          3. SafeGuard 차단 테스트
        </button>
      </div>
      <div class="mt-4 text-[11px] text-slate-500 leading-relaxed">
        스트리밍 모드 ON 시 GET /api/agent/stream (SSE)로 호출.
        토큰이 즉시 흘러나오는 모습을 확인할 수 있습니다.
      </div>
    </aside>
  </div>

<script>
  const cidEl = document.getElementById('cid');
  const messageEl = document.getElementById('message');
  const send = document.getElementById('send');
  const reset = document.getElementById('reset');
  const history = document.getElementById('history');
  const indexBtn = document.getElementById('indexBtn');
  const indexStatus = document.getElementById('indexStatus');
  const streamMode = document.getElementById('streamMode');

  function newCid() { return 'web-' + Date.now(); }
  cidEl.value = newCid();
  reset.addEventListener('click', () => { cidEl.value = newCid(); history.innerHTML = ''; });

  indexBtn.addEventListener('click', async () => {
    indexStatus.textContent = '인덱싱 중...';
    try {
      const res = await fetch('/api/index', { method: 'POST' });
      const data = await res.json();
      indexStatus.textContent = `완료 — ${data.chunks ?? '?'} chunks`;
      indexStatus.className = 'text-xs text-emerald-600';
    } catch (e) { indexStatus.textContent = '에러: ' + e.message; indexStatus.className = 'text-xs text-rose-600'; }
  });

  function addBubble(role, text, meta) {
    const isUser = role === 'user';
    const col = document.createElement('div');
    col.className = isUser ? 'flex flex-col items-end' : 'flex flex-col items-start';
    const bubble = document.createElement('div');
    bubble.className = (isUser ? 'bg-indigo-600 text-white' : 'bg-slate-100 text-slate-800 border border-slate-200')
      + ' max-w-[80%] rounded-2xl px-4 py-2.5 whitespace-pre-wrap text-sm';
    bubble.textContent = text;
    col.appendChild(bubble);
    if (meta) {
      const m = document.createElement('div');
      m.className = 'text-[10px] text-slate-400 mt-1';
      m.textContent = meta;
      col.appendChild(m);
    }
    history.appendChild(col);
    history.scrollTop = history.scrollHeight;
    return bubble;
  }

  async function sendBlocking(text) {
    addBubble('user', text);
    send.disabled = true;
    const t0 = performance.now();
    try {
      const res = await fetch('/api/agent', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: text, conversationId: cidEl.value })
      });
      const data = await res.json();
      addBubble('ai', data.content || JSON.stringify(data),
        `cid=${data.conversationId || cidEl.value} · ${(performance.now()-t0).toFixed(0)}ms`);
    } catch (e) {
      addBubble('ai', '에러: ' + e.message);
    } finally { send.disabled = false; messageEl.focus(); }
  }

  async function sendStreaming(text) {
    addBubble('user', text);
    send.disabled = true;
    const t0 = performance.now();
    const url = `/api/agent/stream?message=${encodeURIComponent(text)}&conversationId=${encodeURIComponent(cidEl.value)}`;
    const bubble = addBubble('ai', '', `cid=${cidEl.value} · streaming...`);
    try {
      const res = await fetch(url);
      const reader = res.body.getReader();
      const decoder = new TextDecoder();
      let acc = '';
      while (true) {
        const { value, done } = await reader.read();
        if (done) break;
        const chunk = decoder.decode(value, { stream: true });
        chunk.split('\n').forEach(line => {
          if (line.startsWith('data:')) acc += line.slice(5);
        });
        bubble.textContent = acc;
        history.scrollTop = history.scrollHeight;
      }
      bubble.nextSibling && (bubble.nextSibling.textContent = `cid=${cidEl.value} · ${(performance.now()-t0).toFixed(0)}ms`);
    } catch (e) {
      bubble.textContent = '에러: ' + e.message;
    } finally { send.disabled = false; messageEl.focus(); }
  }

  function sendMessage(text) {
    if (streamMode.checked) sendStreaming(text);
    else sendBlocking(text);
  }

  send.addEventListener('click', () => {
    const m = messageEl.value.trim();
    if (!m) return;
    messageEl.value = '';
    sendMessage(m);
  });
  messageEl.addEventListener('keydown', (e) => { if (e.key === 'Enter') send.click(); });
  document.querySelectorAll('.scn').forEach(b => b.addEventListener('click', () => sendMessage(b.dataset.msg)));
</script>
</body>
</html>
