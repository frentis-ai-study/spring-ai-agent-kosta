server:
  port: 8080

spring:
  application:
    name: spring-ai-agent-kosta-step5

  datasource:
    url: jdbc:h2:file:./data/agentdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;AUTO_SERVER=TRUE
    driver-class-name: org.h2.Driver
    username: agent
    password: agent

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
    show-sql: false

  ai:
    openai:
      api-key: ${OPENAI_API_KEY:}
      chat:
        options:
          model: gpt-5.4-mini
          temperature: 0.3
      embedding:
        options:
          model: text-embedding-3-small

    chat:
      memory:
        repository:
          jdbc:
            initialize-schema: always

logging:
  level:
    org.springframework.ai: INFO
    com.kosta.agent: DEBUG

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
