server:
  port: 8080

spring:
  application:
    name: spring-ai-agent-kosta-step5

  datasource:
    url: jdbc:postgresql://localhost:5432/agentdb
    username: agent
    password: ${POSTGRES_PASSWORD:agent}

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
    show-sql: false

  ai:
    openai:
      api-key: ${OPENAI_API_KEY:}
      chat:
        options:
          model: gpt-5.4-mini
          temperature: 0.3
      embedding:
        options:
          model: text-embedding-3-small

    vectorstore:
      pgvector:
        index-type: HNSW
        distance-type: COSINE_DISTANCE
        dimensions: 1536
        initialize-schema: true
        schema-name: public
        table-name: vector_store
        max-document-batch-size: 1000

    chat:
      memory:
        repository:
          jdbc:
            initialize-schema: always

logging:
  level:
    org.springframework.ai: INFO
    com.kosta.agent: DEBUG

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
